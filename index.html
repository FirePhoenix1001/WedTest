<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextPresent | 文字美學展示工坊</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Fira+Code:wght@400;600&family=Inter:wght@300;400;600;800&family=Noto+Serif+TC:wght@300;500;700&family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container" class="app-container">
        <!-- Floating Sidebar Toggle for mobile/compact views -->
        <button id="toggle-sidebar-btn" class="floating-btn toggle-btn" title="切換控制面板" aria-label="Toggle Sidebar">
            <i class="fa-solid fa-bars-staggered"></i>
        </button>

        <!-- Sidebar / Controller Panel -->
        <aside id="sidebar-panel" class="control-panel">
            <header class="app-header">
                <div class="logo-area">
                    <div class="logo-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                    <h1>TextPresent</h1>
                </div>
                <p class="subtitle">將任意文字轉化為極致美學展示</p>
            </header>

            <div class="control-sections">
                <!-- Preset Inspirations -->
                <section class="control-section">
                    <h2 class="section-title"><i class="fa-solid fa-lightbulb"></i> 靈感快選</h2>
                    <div class="preset-suggestions">
                        <button class="suggestion-btn" data-preset="quote"><i class="fa-solid fa-quote-left"></i> 經典金句</button>
                        <button class="suggestion-btn" data-preset="poem"><i class="fa-solid fa-feather"></i> 優美詩詞</button>
                        <button class="suggestion-btn" data-preset="code"><i class="fa-solid fa-code"></i> 質感代碼</button>
                        <button class="suggestion-btn" data-preset="minimal"><i class="fa-solid fa-minus"></i> 極簡隨筆</button>
                    </div>
                </section>

                <!-- Input Area -->
                <section class="control-section">
                    <h2 class="section-title"><i class="fa-solid fa-pen-nib"></i> 輸入展示內容</h2>
                    <textarea id="text-input" placeholder="在此輸入或貼上任何您想要呈現的文字..." aria-label="Text Input"></textarea>
                    <div class="char-counter"><span id="char-count">0</span> 字</div>
                </section>

                <!-- Typography Styling -->
                <section class="control-section">
                    <h2 class="section-title"><i class="fa-solid fa-font"></i> 字型與排版</h2>
                    
                    <div class="control-group">
                        <label for="font-family-select">字體選擇</label>
                        <select id="font-family-select">
                            <option value="'Outfit', sans-serif">Outfit (現代無襯線)</option>
                            <option value="'Playfair Display', serif">Playfair Display (優雅襯線)</option>
                            <option value="'Noto Serif TC', serif">思源宋體 (古典中文字型)</option>
                            <option value="'Space Grotesk', sans-serif">Space Grotesk (極客未來)</option>
                            <option value="'Cinzel', serif">Cinzel (古典羅馬字)</option>
                            <option value="'Fira Code', monospace">Fira Code (工程等寬)</option>
                            <option value="'Inter', sans-serif">Inter (萬用無襯線)</option>
                        </select>
                    </div>

                    <div class="control-group-row">
                        <div class="control-group half">
                            <label for="font-size-slider">大小: <span id="font-size-val">32px</span></label>
                            <input type="range" id="font-size-slider" min="16" max="96" value="32">
                        </div>
                        <div class="control-group half">
                            <label for="line-height-slider">行高: <span id="line-height-val">1.6</span></label>
                            <input type="range" id="line-height-slider" min="1.0" max="2.5" step="0.1" value="1.6">
                        </div>
                    </div>

                    <div class="control-group-row">
                        <div class="control-group half">
                            <label for="letter-spacing-slider">字距: <span id="letter-spacing-val">0px</span></label>
                            <input type="range" id="letter-spacing-slider" min="-2" max="15" step="0.5" value="1">
                        </div>
                        <div class="control-group half">
                            <label>對齊方式</label>
                            <div class="align-btn-group">
                                <button class="align-btn active" data-align="center" title="置中對齊" aria-label="Center Align"><i class="fa-solid fa-align-center"></i></button>
                                <button class="align-btn" data-align="left" title="靠左對齊" aria-label="Left Align"><i class="fa-solid fa-align-left"></i></button>
                                <button class="align-btn" data-align="right" title="靠右對齊" aria-label="Right Align"><i class="fa-solid fa-align-right"></i></button>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Background & Art Themes -->
                <section class="control-section">
                    <h2 class="section-title"><i class="fa-solid fa-palette"></i> 藝術主題風格</h2>
                    <div class="theme-grid">
                        <button class="theme-btn active" data-theme="glass" style="background: linear-gradient(135deg, #1f1f2e, #0c0c16); border: 1px solid rgba(255,255,255,0.1);" title="極光磨砂玻璃">
                            <span>極光玻璃</span>
                        </button>
                        <button class="theme-btn" data-theme="sunset" style="background: linear-gradient(135deg, #ff9a9e, #fecfef);" title="落日餘暉">
                            <span>暖陽落日</span>
                        </button>
                        <button class="theme-btn" data-theme="neon" style="background: linear-gradient(135deg, #0f0c1b, #240b36);" title="霓虹幻夜">
                            <span>霓虹幻夜</span>
                        </button>
                        <button class="theme-btn" data-theme="nordic" style="background: linear-gradient(135deg, #e0eafc, #cfdef3);" title="北歐晨曦">
                            <span>北歐晨曦</span>
                        </button>
                        <button class="theme-btn" data-theme="editorial" style="background: #fbfbfb; border: 1px solid #ddd;" title="經典報章">
                            <span>紙質社論</span>
                        </button>
                        <button class="theme-btn" data-theme="cyber" style="background: linear-gradient(135deg, #050505, #121212);" title="數位矩陣">
                            <span>矩陣駭客</span>
                        </button>
                    </div>

                    <div class="control-group glass-intensity-group">
                        <label for="glass-blur-slider">磨砂毛玻璃強度: <span id="glass-blur-val">12px</span></label>
                        <input type="range" id="glass-blur-slider" min="0" max="30" value="12">
                    </div>
                </section>

                <!-- Visual Effects & Animations -->
                <section class="control-section">
                    <h2 class="section-title"><i class="fa-solid fa-wand-magic"></i> 進階特效</h2>
                    <div class="control-group-row">
                        <div class="control-group full">
                            <label for="animation-select">文字載入動畫</label>
                            <select id="animation-select">
                                <option value="anim-fade-in">淡入漸顯 (Fade In)</option>
                                <option value="anim-slide-up">滑入展開 (Slide Up)</option>
                                <option value="anim-scale-up">焦點放大 (Scale Up)</option>
                                <option value="anim-blur-reveal">迷霧漫延 (Blur Reveal)</option>
                                <option value="anim-none">無動畫</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="control-group checkbox-group">
                        <label class="custom-checkbox">
                            <input type="checkbox" id="ambient-particles-check" checked>
                            <span class="checkmark"></span>
                            背景流光粒子動畫
                        </label>
                    </div>
                </section>
            </div>

            <!-- Panel Action Footer -->
            <footer class="panel-actions">
                <button id="export-png-btn" class="primary-btn"><i class="fa-solid fa-download"></i> 導出精美卡片</button>
                <div class="action-btn-row">
                    <button id="fullscreen-btn" class="secondary-btn" title="全螢幕展示"><i class="fa-solid fa-expand"></i> 全螢幕</button>
                    <button id="copy-text-btn" class="secondary-btn" title="複製目前文字"><i class="fa-solid fa-copy"></i> 複製</button>
                </div>
            </footer>
        </aside>

        <!-- Preview Workspace Area -->
        <main id="preview-workspace" class="preview-workspace">
            <div id="particles-container" class="particles-container"></div>
            
            <!-- Presentation Container -->
            <div id="presentation-card-container" class="presentation-card-container">
                <div id="presentation-card" class="presentation-card theme-glass">
                    <div class="card-glow-effect"></div>
                    <div class="card-content">
                        <!-- Watermark/Header inside card -->
                        <div class="card-header">
                            <span class="card-tag" id="card-tag-val">TEXT PRESENTATION</span>
                            <span class="card-decor"><i class="fa-solid fa-ellipsis"></i></span>
                        </div>
                        
                        <!-- RENDERED OUTPUT -->
                        <div id="rendered-text" class="rendered-text anim-fade-in">
                            這裡將以極致的視覺排版呈現您的文字。
                        </div>

                        <!-- Card Footer -->
                        <div class="card-footer">
                            <span class="author-info" id="card-author-val">— TextPresent Studio</span>
                            <span class="card-timestamp" id="card-date-val">2026.06.02</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Floating hint / actions overlaying presentation workspace -->
            <div class="floating-tips">
                <p><i class="fa-solid fa-info-circle"></i> 按住鍵盤 <kbd>Esc</kbd> 鍵可退出全螢幕模式</p>
            </div>
        </main>
    </div>

    <!-- html2canvas library for exporting canvas to image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Custom Application Script -->
    <script src="app.js"></script>
</body>
</html>
